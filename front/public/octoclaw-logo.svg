<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Body (head) -->
  <ellipse cx="50" cy="45" rx="30" ry="25" fill="url(#bodyGradient)"/>
  
  <!-- Eyes -->
  <ellipse cx="40" cy="40" rx="8" ry="10" fill="white"/>
  <ellipse cx="60" cy="40" rx="8" ry="10" fill="white"/>
  <circle cx="42" cy="42" r="4" fill="#1e293b"/>
  <circle cx="62" cy="42" r="4" fill="#1e293b"/>
  <circle cx="44" cy="40" r="1.5" fill="white"/>
  <circle cx="64" cy="40" r="1.5" fill="white"/>
  
  <!-- Smile -->
  <path d="M 42 52 Q 50 58 58 52" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Tentacles (8 legs) -->
  <!-- Top left -->
  <path d="M 25 35 Q 10 20 5 30 Q 8 40 20 45" fill="url(#bodyGradient)" stroke="#6366f1" stroke-width="1"/>
  <circle cx="5" cy="30" r="3" fill="url(#bodyGradient)"/>
  
  <!-- Left 1 -->
  <path d="M 22 45 Q 5 50 3 60 Q 5 70 18 65" fill="url(#bodyGradient)" stroke="#6366f1" stroke-width="1"/>
  <circle cx="3" cy="60" r="3" fill="url(#bodyGradient)"/>
  
  <!-- Left 2 -->
  <path d="M 25 55 Q 8 65 5 75 Q 8 85 22 78" fill="url(#bodyGradient)" stroke="#6366f1" stroke-width="1"/>
  <circle cx="5" cy="75" r="3" fill="url(#bodyGradient)"/>
  
  <!-- Left 3 -->
  <path d="M 32 65 Q 20 80 25 90 Q 32 95 40 88" fill="url(#bodyGradient)" stroke="#6366f1" stroke-width="1"/>
  <circle cx="25" cy="90" r="3" fill="url(#bodyGradient)"/>
  
  <!-- Right 1 -->
  <path d="M 75 45 Q 95 50 97 60 Q 95 70 82 65" fill="url(#bodyGradient)" stroke="#6366f1" stroke-width="1"/>
  <circle cx="97" cy="60" r="3" fill="url(#bodyGradient)"/>
  
  <!-- Right 2 -->
  <path d="M 75 55 Q 92 65 95 75 Q 92 85 78 78" fill="url(#bodyGradient)" stroke="#6366f1" stroke-width="1"/>
  <circle cx="95" cy="75" r="3" fill="url(#bodyGradient)"/>
  
  <!-- Right 3 -->
  <path d="M 68 65 Q 80 80 75 90 Q 68 95 60 88" fill="url(#bodyGradient)" stroke="#6366f1" stroke-width="1"/>
  <circle cx="75" cy="90" r="3" fill="url(#bodyGradient)"/>
  
  <!-- Top right -->
  <path d="M 75 35 Q 90 20 95 30 Q 92 40 80 45" fill="url(#bodyGradient)" stroke="#6366f1" stroke-width="1"/>
  <circle cx="95" cy="30" r="3" fill="url(#bodyGradient)"/>
</svg>
